syntax = "proto3";

package front.grpc.types;

import "scalapb/scalapb.proto";

option java_package = "front.grpc.types";
option java_multiple_files = true;

// Get rid of unknown fields junk
option (scalapb.options) = {
  package_name: "front.grpc.types"
  preserve_unknown_fields : false
};

message PingRequest {}
message PingResponse {
  string local = 1;
  string server = 2;
}

service GanbariService {
  rpc Ping(PingRequest) returns (PingResponse);
}
