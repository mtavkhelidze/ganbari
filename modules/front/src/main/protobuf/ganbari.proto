syntax = "proto3";

package front.grpc.types;

option java_package = "front.grpc.types";
option java_multiple_files = true;

message RequestContext {
  string tz = 1; // ISO offset e.g. "+04:00"
}

message PingRequest {
  RequestContext ctx = 1;
}

message PingResponse {
  string local = 1;
  string utc = 2;
}

service GanbariService {
  rpc Ping(PingRequest) returns (PingResponse);
}
